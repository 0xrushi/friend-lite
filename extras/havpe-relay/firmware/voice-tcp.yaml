substitutions:
  device_name: voice-pe
  wifi_ssid: !secret wifi_ssid
  wifi_pwd: !secret wifi_password
  relay_ip: !secret relay_ip_address
  relay_port: "8989"

esphome:
  name: ${device_name}
  friendly_name: Voice PE
  includes:
    - tcp_stream.h
    - chronicle-sdk/chronicle.h
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: led_ring
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_pwd}

  on_connect:
    then:
      - logger.log: "Wi-Fi connected"
      - light.turn_on:
          id: led_ring
          red: 100%
          green: 50%
          blue: 0%
          brightness: 30%
      - microphone.capture

  on_disconnect:
    then:
      - logger.log: "Wi-Fi disconnected"
      - lambda: |-
          chronicle::disconnect();
          id(relay_ok) = false;
      - light.turn_on:
          id: led_ring
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%

api:

# ─────────── globals ─────────────────────────────────────────────
globals:
  - id: relay_ok
    type: bool
    initial_value: 'false'

# ─────────── LED ring (12x WS2812 on GPIO21, power on GPIO45) ───
power_supply:
  - id: led_power
    pin: GPIO45

light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    pin: GPIO21
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 12
    rgb_order: GRB
    rmt_symbols: 192
    default_transition_length: 0ms
    power_supply: led_power

# ─────────── button (GPIO0 active-low with pull-up) ─────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    id: center_button
    on_multi_click:
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - lambda: 'chronicle::send_button(chronicle::BTN_SINGLE);'
          - logger.log: "Button: SINGLE"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - lambda: 'chronicle::send_button(chronicle::BTN_DOUBLE);'
          - logger.log: "Button: DOUBLE"
      - timing:
          - ON for at least 1s
        then:
          - lambda: 'chronicle::send_button(chronicle::BTN_LONG);'
          - logger.log: "Button: LONG"

# ─────────── intervals ──────────────────────────────────────────
interval:
  - interval: 10s
    then:
      - logger.log:
          level: INFO
          format: "heartbeat - mic: %s, relay: %s"
          args:
            - 'id(mic_in).is_running() ? "yes" : "no"'
            - 'id(relay_ok) ? "yes" : "no"'

  # Connect/reconnect to relay
  - interval: 5s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: 'return !chronicle::is_connected();'
          then:
            - logger.log: "Connecting to relay..."
            - lambda: |-
                chronicle::disconnect();
                bool ok = chronicle::connect_relay("${relay_ip}", ${relay_port});
                id(relay_ok) = ok;

  # LED status
  - interval: 2s
    then:
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - light.turn_on: { id: led_ring, red: 100%, green: 0%, blue: 0%, brightness: 30% }
          else:
            - if:
                condition:
                  lambda: 'return id(relay_ok) && chronicle::is_connected();'
                then:
                  - light.turn_on: { id: led_ring, red: 0%, green: 0%, blue: 100%, brightness: 30% }
                else:
                  - light.turn_on: { id: led_ring, red: 100%, green: 50%, blue: 0%, brightness: 30% }

# ─────────── I2S bus and microphone ──────────────────────────────
i2s_audio:
  id: i2s_input
  i2s_lrclk_pin:
    number: GPIO14
  i2s_bclk_pin:
    number: GPIO13

microphone:
  - platform: i2s_audio
    id: mic_in
    adc_type: external
    i2s_audio_id: i2s_input
    i2s_din_pin: GPIO15
    i2s_mode: secondary
    sample_rate: 16000
    bits_per_sample: 32bit
    channel: stereo

    on_data:
      then:
        - lambda: |-
            int32_t* samples = (int32_t*)x.data();
            int n_frames = x.size() / 8;  // 8 bytes per stereo frame
            if (n_frames <= 0) return;

            int16_t mono[n_frames];
            for (int i = 0; i < n_frames; i++) {
              mono[i] = (int16_t)(samples[i * 2] >> 16);
            }

            chronicle::send_audio((const uint8_t*)mono, n_frames * 2);
