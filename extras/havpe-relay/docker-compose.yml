services:
  havpe-relay:
    image: ${CHRONICLE_REGISTRY:-}chronicle-havpe-relay:${CHRONICLE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${TCP_PORT:-8989}:8989"
    env_file: .env
    environment:
      - TCP_PORT=${TCP_PORT:-8989}
      - DEBUG=${DEBUG:-0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "netstat", "-an", "|", "grep", "8989"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["uv", "run", "python3", "main.py",
              "--backend-url", "${BACKEND_URL:-http://host.docker.internal:8000}",
              "--backend-ws-url", "${BACKEND_WS_URL:-ws://host.docker.internal:8000}"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./audio_chunks:/app/audio_chunks
